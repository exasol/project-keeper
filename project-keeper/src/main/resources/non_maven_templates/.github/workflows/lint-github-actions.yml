# Generated by Project Keeper
# https://github.com/exasol/project-keeper/blob/main/project-keeper/src/main/resources/non_maven_templates/.github/workflows/lint-github-actions.yml
name: Lint GitHub Actions
on:
  push:
    branches:
      - main
      - release/*
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  lint-github-actions:
    runs-on: ubuntu-latest
    permissions:
      security-events: write # needed for advanced security
      contents: read # only needed for private or internal repos
      actions: read # only needed for private or internal repos
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - id: checkout
        name: Checkout the repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Lint GitHub actions with Zizmore
        id: lint-github-actions
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: false
